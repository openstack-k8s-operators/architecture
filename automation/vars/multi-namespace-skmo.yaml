---
vas:
  multi-namespace-skmo:
    stages:
      - name: namespace-configuration    # stage 0
        path: examples/va/multi-namespace/namespace
        wait_conditions:
          - >-
            oc -n default wait ns openstack2
            --for jsonpath='{.status.phase}'=Active
            --timeout=5m
        values:
          - name: namespace-values
            src_file: values.yaml
        build_output: namespace.yaml

      - name: nncp-configuration    # stage 1
        path: examples/va/multi-namespace/control-plane/networking/nncp
        wait_conditions:
          # We don't wait for these NNCPs at this stage, because we'll wait for
          # both namespaces in the next stage so that they can deploy in parallel
          # to save time
          - >-
            oc -n default wait ns openstack2
            --for jsonpath='{.status.phase}'=Active
            --timeout=5m
        values:
          - name: network-values
            src_file: values.yaml
        build_output: nncp.yaml

      - name: nncp-configuration2    # stage 2
        path: examples/va/multi-namespace/control-plane2/networking/nncp
        wait_conditions:
          - >-
            oc -n openstack wait nncp
            -l osp/nncm-config-type=standard
            --for jsonpath='{.status.conditions[0].reason}'=SuccessfullyConfigured
            --timeout=5m
        values:
          - name: network-values2
            src_file: values.yaml
        build_output: nncp2.yaml

      - name: network-configuration    # stage 3
        path: examples/va/multi-namespace/control-plane/networking
        wait_conditions:
          - >-
            oc -n metallb-system wait pod
            -l app=metallb -l component=speaker
            --for condition=Ready
            --timeout=5m
        values:
          - name: network-values
            src_file: nncp/values.yaml
        build_output: network.yaml

      - name: network-configuration2    # stage 4
        path: examples/va/multi-namespace/control-plane2/networking
        wait_conditions:
          - >-
            oc -n metallb-system wait pod
            -l app=metallb -l component=speaker
            --for condition=Ready
            --timeout=5m
        values:
          - name: network-values2
            src_file: nncp/values.yaml
        build_output: network2.yaml

      - pre_stage_run:    # stage 5
          - name: 01 Apply cinder-lvm label on master-0
            type: cr
            definition:
              metadata:
                labels:
                  openstack.org/cinder-lvm: ""
            kind: Node
            resource_name: master-0
            state: patched
          - name: 02 Bootstrap Keycloak for Keystone federation
            type: playbook
            source: "federation-pre-deploy.yml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"
        name: control-plane    # stage 5
        path: examples/va/multi-namespace-skmo/control-plane
        wait_conditions:
          # Just confirm the central OSCP CR exists in the API server.
          # The pre_stage_run of stage 6 (prepare-leaf.yaml) will use
          # Ansible retry logic to wait for Keystone and openstackclient
          # readiness before proceeding, allowing parallel deployment.
          - >-
            oc -n openstack wait osctlplane controlplane
            --for jsonpath='{.metadata.name}'=controlplane
            --timeout=5m
        values:
          - name: service-values
            src_file: service-values.yaml
          - name: network-values
            src_file: ../../multi-namespace/control-plane/networking/nncp/values.yaml
        build_output: ../control-plane.yaml
        post_stage_run:
          # Run after the OSCP is deployed to update the CA bundle secret and
          # patch the existing OpenStackControlPlane CR with caBundleSecretName.
          - name: Configure Keystone control plane for federation
            type: playbook
            source: "federation-controlplane-config-postdeploy.yml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"

      - pre_stage_run:    # stage 6
          - name: 01 Update container images for openstack2 namespace
            # Run before deploying the leaf control plane so that:
            #  - Fresh deploys start with the correct images (no restart).
            #  - Re-runs wait for the OSCP to settle before continuing.
            # Numeric prefix required: run_hook sorts hooks alphabetically by name.
            type: playbook
            source: "../../playbooks/multi-namespace/ns2_update_containers.yaml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"
            extra_vars:
              cifmw_update_containers_namespace: openstack2
              cifmw_update_containers_metadata: controlplane
              cifmw_update_containers: "true"
          - name: 02 Install Skupper operator
            type: playbook
            source: "skmo/skupper-install.yaml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"
          - name: 03 Create and link Skupper Sites
            type: playbook
            source: "skmo/skupper-sites.yaml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"
          - name: 04 Create Skupper Connector for central Keystone internal endpoint
            # Must run before the leaf OSCP is applied so that the Skupper
            # virtual Service (keystone-regionone) exists when OpenStack
            # services first try to authenticate.  The cert-manager Certificate
            # is created here too; it will reconcile once the OSCP operator
            # creates the rootca-internal Issuer during stage 6 deployment.
            # Set cifmw_skupper_keystone_enabled=false to skip and revert
            # keystoneInternalURL in skmo-values.yaml to the public URL.
            type: playbook
            source: "skmo/skupper-keystone-connector.yaml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"
          - name: 05 Set Application Credential enablement in skmo-values.yaml
            # Writes cifmw_skmo_appcred_enabled into skmo-values.yaml before
            # the kustomize build so the OSCP is created with AC enabled or
            # disabled from the first apply — no reload required.
            # Default is true; set cifmw_skmo_appcred_enabled=false to disable.
            type: playbook
            source: "skmo/configure-leaf-appcred.yaml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"
          - name: 06 Create Skupper Listener for Keystone in leaf namespace
            type: playbook
            source: "skmo/skupper-listener.yaml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"
            extra_vars:
              cifmw_skupper_listener_enabled: true
              cifmw_skupper_listener_name: keystone-internal
              cifmw_skupper_listener_cert_name: skupper-keystone-regionone
              cifmw_skupper_listener_cert_secret: cert-skupper-keystone-regionone
              cifmw_skupper_listener_routing_key: keystone-internal
              cifmw_skupper_listener_host: keystone-regionone
              cifmw_skupper_listener_port: 5000
              cifmw_skupper_listener_namespace: openstack2
              cifmw_skupper_listener_ignore_wait_errors: true
          - name: 07 Prepare SKMO leaf prerequisites in regionZero
            type: playbook
            source: "skmo/prepare-leaf.yaml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"
        name: control-plane2    # stage 6
        path: examples/va/multi-namespace-skmo/control-plane2
        wait_conditions:
          - >-
            oc -n openstack wait osctlplane controlplane --for condition=Ready
            --timeout=60m
          - >-
            oc -n openstack2 wait osctlplane controlplane --for condition=Ready
            --timeout=60m
        values:
          - name: service-values
            src_file: service-values.yaml
          - name: network-values2
            src_file: ../../multi-namespace/control-plane2/networking/nncp/values.yaml
        build_output: ../control-plane2.yaml
        post_stage_run:
          - name: 01 Update central CA bundle with leaf region CAs and wait for reconciliation
            # Numeric prefix required: run_hook sorts hooks alphabetically by name.
            type: playbook
            source: "skmo/update-central-ca-bundle.yaml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"
          - name: 02 Create Skupper Connector for central RabbitMQ
            type: playbook
            source: "skmo/skupper-connector.yaml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"
          - name: 03 Create Skupper Listener for RabbitMQ in leaf namespace
            type: playbook
            source: "skmo/skupper-listener.yaml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"
            extra_vars:
              cifmw_skupper_listener_name: rabbitmq-keystone
              cifmw_skupper_listener_cert_name: skupper-rabbitmq-regionone
              cifmw_skupper_listener_cert_secret: cert-skupper-rabbitmq-regionone
              cifmw_skupper_listener_routing_key: rabbit-keystone
              cifmw_skupper_listener_host: rabbitmq-regionone
              cifmw_skupper_listener_port: 5671
              cifmw_skupper_listener_namespace: openstack2
              cifmw_skupper_listener_ignore_wait_errors: false
          - name: 04 Configure barbican-keystone-listener to use Skupper
            type: playbook
            source: "skmo/configure-leaf-listener.yaml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"
          - name: 05 Patch leaf OSCP internal Keystone endpoint and expose to EDPM
            # Rewrites the leaf OSCP internal Keystone override to the Skupper
            # virtual service URL and creates a MetalLB LoadBalancer Service +
            # DNSData CR so EDPM compute nodes can resolve the Skupper Keystone
            # hostname.  Skipped automatically when cifmw_skupper_keystone_enabled
            # is false (set in skupper-keystone-connector.yaml pre-stage hook).
            type: playbook
            source: "skmo/configure-leaf-keystone-internal.yaml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"
          - name: 06 Configure Keycloak realms and Keystone federation IdP
            type: playbook
            source: "federation-post-deploy.yml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"

      - name: edpm-nodeset    # stage 7
        path: examples/va/multi-namespace/edpm/nodeset
        wait_conditions:
          # We don't wait for this namespace's OpenStackDataPlaneNodeSet at
          # this stage, because we'll wait for both namespaces in the next
          # stage so that they can deploy in parallel to save time
          - >-
            oc -n default wait ns openstack2
            --for jsonpath='{.status.phase}'=Active
            --timeout=5m
        values:
          - name: edpm-nodeset-values
            src_file: values.yaml
        build_output: nodeset.yaml

      - pre_stage_run:    # stage 8
          - name: Get OpenStackDataPlaneServices for openstack2 namespace
            type: playbook
            source: "../../playbooks/multi-namespace/ns2_osdp_services.yaml"
            inventory: "${HOME}/ci-framework-data/artifacts/zuul_inventory.yml"
        name: edpm-nodeset2
        path: examples/va/multi-namespace/edpm2/nodeset
        wait_conditions:
          - >-
            oc -n openstack wait
            osdpns openstack-edpm --for condition=SetupReady
            --timeout=10m
          - >-
            oc -n openstack2 wait
            osdpns openstack-edpm --for condition=SetupReady
            --timeout=10m
        values:
          - name: edpm-nodeset2-values
            src_file: values.yaml
        build_output: nodeset2.yaml

      - name: edpm-deployment    # stage 9
        path: examples/va/multi-namespace/edpm
        wait_conditions:
          # We don't wait for this namespace's OpenStackDataPlaneDeployment at
          # this stage, because we'll wait for both namespaces in the next
          # stage so that they can deploy in parallel to save time
          - >-
            oc -n default wait ns openstack2
            --for jsonpath='{.status.phase}'=Active
            --timeout=5m
        values:
          - name: edpm-deployment-values
            src_file: values.yaml
        build_output: deployment.yaml

      - name: edpm-deployment2    # stage 10
        path: examples/va/multi-namespace/edpm2
        wait_conditions:
          - >-
            oc -n openstack wait
            osdpns openstack-edpm --for condition=Ready
            --timeout=60m
          - >-
            oc -n openstack2 wait
            osdpns openstack-edpm --for condition=Ready
            --timeout=60m
        values:
          - name: edpm-deployment2-values
            src_file: values.yaml
        build_output: deployment2.yaml
