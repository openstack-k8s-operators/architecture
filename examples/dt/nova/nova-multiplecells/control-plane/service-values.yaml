---
apiVersion: v1
kind: ConfigMap

metadata:
  name: service-values
  annotations:
    config.kubernetes.io/local-config: "true"

data:
  preserveJobs: false
  galera:
    templates:
      openstack:
        storageClass: lvms-local-storage
        storageRequest: 5G
        secret: osp-secret
        replicas: 3
      openstack-cell1:
        storageClass: lvms-local-storage
        storageRequest: 5G
        secret: osp-secret
        replicas: 3
      openstack-cell2:
        storageClass: lvms-local-storage
        storageRequest: 5G
        secret: osp-secret
        replicas: 3

  rabbitmq:
    templates:
      rabbitmq-cell2:
        replicas: 3

  nova:
    template:
      secret: osp-secret
      cellTemplates:
        cell0:
          cellDatabaseAccount: nova-cell0
          cellDatabaseInstance: openstack
          cellMessageBusInstance: rabbitmq
          conductorServiceTemplate:
            replicas: 3
          hasAPIAccess: true
        cell1:
          cellDatabaseAccount: nova-cell1
          cellDatabaseInstance: openstack-cell1
          cellMessageBusInstance: rabbitmq-cell1
          conductorServiceTemplate:
            replicas: 3
          hasAPIAccess: true
        cell2:
          cellDatabaseAccount: nova-cell2
          cellDatabaseInstance: openstack-cell2
          cellMessageBusInstance: rabbitmq-cell2
          conductorServiceTemplate:
            replicas: 3
          hasAPIAccess: true
