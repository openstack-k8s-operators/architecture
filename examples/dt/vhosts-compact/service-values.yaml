# local-config: referenced, but not emitted by kustomize
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-values
  annotations:
    config.kubernetes.io/local-config: "true"
data:
  # --- Fields required by lib/control-plane ---
  preserveJobs: false
  notificationsBus:
    cluster: rabbitmq-notifications
  tls:
    caBundleSecretName: ""

  # --- Top-level messagingBus (RPC default cluster) ---
  messagingBus:
    cluster: rabbitmq

  # --- Per-service messagingBus (RPC with vhost/user isolation) ---
  barbican:
    messagingBus:
      cluster: rabbitmq
      vhost: barbican
      user: barbican
  cinder:
    messagingBus:
      cluster: rabbitmq
      vhost: cinder
      user: cinder
  cinderBackup:
    replicas: 3
    customServiceConfig: |
      [DEFAULT]
      backup_driver = cinder.backup.drivers.ceph.CephBackupDriver
      backup_ceph_pool = backups
      backup_ceph_user = openstack
  cinderVolumes:
    ceph:
      customServiceConfig: |
        [DEFAULT]
        enabled_backends = ceph
        [ceph]
        volume_backend_name = ceph
        volume_driver = cinder.volume.drivers.rbd.RBDDriver
        rbd_ceph_conf = /etc/ceph/ceph.conf
        rbd_user = openstack
        rbd_pool = volumes
        rbd_flatten_volume_from_snapshot = False
        rbd_secret_uuid = CHANGEME
  designate:
    messagingBus:
      cluster: rabbitmq
      vhost: designate
      user: designate
    nsRecords:
      - hostname: ns1.example.org.
        priority: 1
      - hostname: ns2.example.org.
        priority: 2
    bind9Services:
      services:
        - metadata:
            annotations:
              metallb.universe.tf/address-pool: designateext
              metallb.universe.tf/allow-shared-ip: designateext
              metallb.universe.tf/LoadBalancerIPs: 172.34.0.80
          spec:
            type: LoadBalancer
        - metadata:
            annotations:
              metallb.universe.tf/address-pool: designateext
              metallb.universe.tf/allow-shared-ip: designateext
              metallb.universe.tf/LoadBalancerIPs: 172.34.0.81
          spec:
            type: LoadBalancer
        - metadata:
            annotations:
              metallb.universe.tf/address-pool: designateext
              metallb.universe.tf/allow-shared-ip: designateext
              metallb.universe.tf/LoadBalancerIPs: 172.34.0.82
          spec:
            type: LoadBalancer
  glance:
    customServiceConfig: |
      [DEFAULT]
      enabled_backends = default_backend:rbd
      [glance_store]
      default_backend = default_backend
      [default_backend]
      rbd_store_ceph_conf = /etc/ceph/ceph.conf
      store_description = "RBD backend"
      rbd_store_pool = images
      rbd_store_user = openstack
      rbd_thin_provisioning = True
    default:
      replicas: 3
  heat:
    messagingBus:
      cluster: rabbitmq
      vhost: heat
      user: heat
  ironic:
    messagingBus:
      cluster: rabbitmq
      vhost: ironic
      user: ironic
  manila:
    messagingBus:
      cluster: rabbitmq
      vhost: manila
      user: manila
    manilaAPI:
      replicas: 3
      customServiceConfig: |
        [DEFAULT]
        enabled_share_protocols = nfs
    manilaScheduler:
      replicas: 3
    manilaShares:
      share1:
        replicas: 1
        customServiceConfig: |
          [DEFAULT]
          enabled_share_backends = cephfsnfs
          debug = True

          [cephfsnfs]
          driver_handles_share_servers = False
          share_backend_name = cephfs
          share_driver = manila.share.drivers.cephfs.driver.CephFSDriver
          cephfs_auth_id = openstack
          cephfs_cluster_name = ceph
          cephfs_nfs_cluster_id = cephfs
          cephfs_protocol_helper_type = NFS
  neutron:
    messagingBus:
      cluster: rabbitmq
      vhost: neutron
      user: neutron
  nova:
    messagingBus:
      cluster: rabbitmq
      vhost: nova
      user: nova
    cell0:
      messagingBus:
        cluster: rabbitmq
        vhost: nova-cell0
        user: nova-cell0
    cell1:
      messagingBus:
        cluster: rabbitmq
        vhost: nova-cell1
        user: nova-cell1
  octavia:
    messagingBus:
      cluster: rabbitmq
      vhost: octavia
      user: octavia
    amphoraImageContainerImage: quay.io/gthiemonge/octavia-amphora-image
    apacheContainerImage: registry.redhat.io/ubi9/httpd-24:latest
    octaviaAPI:
      networkAttachments:
        - internalapi
    octaviaHousekeeping:
      networkAttachments:
        - octavia
    octaviaHealthManager:
      networkAttachments:
        - octavia
    octaviaWorker:
      networkAttachments:
        - octavia
  ovn:
    ovnController:
      nicMappings:
        datacentre: ospbr
        octavia: octbr
  designate-redis:
    enabled: true
    replicas: 1
  swift:
    enabled: true
  telemetry:
    metricStorage:
      enabled: true
    ceilometer:
      enabled: true
    cloudkitty:
      messagingBus:
        cluster: rabbitmq
        vhost: telemetry
        user: telemetry
  watcher:
    enabled: true
    messagingBus:
      cluster: rabbitmq
      vhost: watcher
      user: watcher

  # --- Ceph extraMounts for control plane services ---
  extraMounts:
    - name: v1
      region: r1
      extraVol:
        - propagation:
            - CinderVolume
            - CinderBackup
            - GlanceAPI
            - ManilaShare
          extraVolType: Ceph
          volumes:
            - name: ceph
              projected:
                sources:
                  - secret:
                      name: ceph-conf-files
          mounts:
            - name: ceph
              mountPath: /etc/ceph
              readOnly: true

  # --- RabbitMQ notifications cluster ---
  rabbitmq:
    templates:
      rabbitmq-notifications:
        override:
          service:
            metadata:
              annotations:
                metallb.universe.tf/address-pool: internalapi
                metallb.universe.tf/loadBalancerIPs: 172.17.0.88
            spec:
              type: LoadBalancer
        replicas: 3
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "1"
            memory: 4Gi
