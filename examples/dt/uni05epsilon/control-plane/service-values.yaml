---
apiVersion: v1
kind: ConfigMap

metadata:
  name: service-values
  annotations:
    config.kubernetes.io/local-config: "true"

data:
  # --- Fields required by lib/control-plane ---
  preserveJobs: false
  notificationsBus:
    cluster: rabbitmq-notifications
  tls:
    caBundleSecretName: ""

  # --- Below are VA/DT-specific data ---
  galera:
    templates:
      openstack-cell2:
        storageRequest: 5G
        secret: osp-secret
        replicas: 3

  nova:
    template:
      cellTemplates:
        cell2:
          cellDatabaseAccount: nova-cell2
          cellDatabaseInstance: openstack-cell2
          messagingBus:
            cluster: rabbitmq-cell2
          conductorServiceTemplate:
            replicas: 1
          hasAPIAccess: true

  rabbitmq:
    templates:
      rabbitmq-cell2:
        replicas: 3
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "1"
            memory: 4Gi
      rabbitmq-notifications:
        override:
          service:
            metadata:
              annotations:
                metallb.universe.tf/address-pool: internalapi
                metallb.universe.tf/loadBalancerIPs: 172.17.0.88
            spec:
              type: LoadBalancer
        replicas: 3
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "1"
            memory: 4Gi
