---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

components:
  - ../../../../../dt/bgp/edpm/deployment

resources:
  - values.yaml

replacements:
  - source:
      kind: ConfigMap
      name: edpm-deployment-values
      fieldPath: data.nodeSets
    targets:
      - select:
          kind: OpenStackDataPlaneDeployment
        fieldPaths:
          - spec.nodeSets
