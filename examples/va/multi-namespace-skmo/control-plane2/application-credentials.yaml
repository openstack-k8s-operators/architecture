---
# JSON patch enabling Keystone Application Credentials for all services
# running in the leaf (openstack2) control plane.
#
# Expressed as a JSON (RFC 6902) patch — NOT a strategic-merge patch — so that
# kustomize does not trigger the YAML-to-JSON-to-YAML round-trip that
# stringifies boolean values set by component-level ConfigMap replacements
# (e.g. preserveJobs from lib/control-plane/job-settings).
#
# Included in kustomization.yaml so AC is enabled from the very first OSCP
# apply.  Services start with v3applicationcredential auth from day one —
# no reload cycle — and EDPM compute nodes receive AC credentials on their
# initial deployment (stages 7-10), so no separate EDPM redeployment is needed.
#
# The ci-framework playbook configure-leaf-appcred.yaml acts as a readiness
# gate: it waits for all KeystoneApplicationCredential CRs to reach Ready
# status before the pipeline proceeds to the EDPM stages.
#
# See examples/va/multi-namespace-skmo/application-credentials.md for full
# documentation including the EDPM rotation operational notes.
- op: add
  path: /spec/applicationCredential
  value:
    # Global defaults inherited by all per-service AC sections unless overridden.
    # expirationDays / gracePeriodDays are deliberately generous so that the
    # mandatory EDPM redeployment for nova can be scheduled within the overlap
    # window before the old credential expires.
    enabled: true
    expirationDays: 730
    gracePeriodDays: 182
- op: add
  path: /spec/barbican/applicationCredential
  value:
    enabled: true
- op: add
  path: /spec/cinder/applicationCredential
  value:
    enabled: true
- op: add
  path: /spec/glance/applicationCredential
  value:
    enabled: true
- op: add
  path: /spec/neutron/applicationCredential
  value:
    enabled: true
- op: add
  path: /spec/nova/applicationCredential
  value:
    enabled: true
    # nova requires the 'member' role in addition to 'admin' and 'service'
    # so that it can enumerate project/user resources on behalf of tenants.
    roles:
      - admin
      - service
      - member
- op: add
  path: /spec/placement/applicationCredential
  value:
    enabled: true
