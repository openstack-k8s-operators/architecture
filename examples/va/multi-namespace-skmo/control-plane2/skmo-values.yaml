---
apiVersion: v1
kind: ConfigMap
metadata:
  name: skmo-values
  annotations:
    config.kubernetes.io/local-config: "true"
data:
  # Leaf region name registered in the central Keystone
  leafRegion: regionTwo
  # Leaf admin user (must exist in central Keystone)
  leafAdminUser: admin-two
  leafAdminProject: admin
  leafAdminPasswordKey: AdminPassword
  # Central Keystone endpoints.
  # keystoneInternalURL is rewritten at CI time by skupper-keystone-connector.yaml
  # based on cifmw_skupper_keystone_enabled:
  #   true  → https://keystone-regionone.openstack2.svc.cluster.local:5000 (Skupper tunnel)
  #   false → same as keystonePublicURL (standard public routing)
  keystoneInternalURL: https://keystone-public-openstack.apps.ocp.openstack.lab
  keystonePublicURL: https://keystone-public-openstack.apps.ocp.openstack.lab
  # CA bundle secrets
  # Leaf region secret (must include central Keystone CA)
  leafCaBundleSecretName: custom-ca-certs
  # Central region secret (must include leaf region CA)
  centralCaBundleSecretName: custom-ca-certs
  # Application Credentials (near zero downtime password rotation).
  # Rewritten at CI time by skmo/configure-leaf-appcred.yaml based on
  # cifmw_skmo_appcred_enabled (default: true).  Set to false to disable AC
  # for all leaf services.
  # See examples/va/multi-namespace-skmo/application-credentials.md for details.
  applicationCredentialEnabled: true

  # Leaf service users (created by operators in leaf region)
  serviceUserBarbican: regionTwo_barbican
  serviceUserCinder: regionTwo_cinder
  serviceUserGlance: regionTwo_glance
  serviceUserNeutron: regionTwo_neutron
  serviceUserNova: regionTwo_nova
  serviceUserPlacement: regionTwo_placement
