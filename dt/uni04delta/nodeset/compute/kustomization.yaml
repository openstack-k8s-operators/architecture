---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: OpenStackDataPlaneNodeSet
    patch: |-
      - op: add
        path: /spec/nodeTemplate/networks/-
        value:
          name: nfs
          subnetName: subnet1
      - op: add
        path: /spec/nodes/edpm-compute-0/networks/-
        value:
          name: nfs
          subnetName: subnet1
      - op: add
        path: /spec/nodes/edpm-compute-1/networks/-
        value:
          name: nfs
          subnetName: subnet1
